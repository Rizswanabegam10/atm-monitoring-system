<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>ATM Locations Map</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>
</head>

<body>

<!-- Heading -->
<h1 class="center">📍 ATM Locations</h1>

<!-- Map Container -->
<div id="map" class="map-container"></div>

<!-- Map Script -->
<script>
    const map = new google.maps.Map(document.getElementById("map"), {
        zoom: 14,
        center: { lat: 12.9716, lng: 77.5946 }
    });

    const atmLocations = [
        { name: "ATM001", lat: 12.9716, lng: 77.5946 },
        { name: "ATM002", lat: 12.9721, lng: 77.5901 },
        { name: "ATM003", lat: 12.9750, lng: 77.5920 },
        { name: "ATM004", lat: 12.9700, lng: 77.5980 },
        { name: "ATM005", lat: 12.9690, lng: 77.6000 }
    ];

    atmLocations.forEach(atm => {
        new google.maps.Marker({
            position: { lat: atm.lat, lng: atm.lng },
            map: map,
            title: atm.name
        });
    });
</script>

</body>
</html>
